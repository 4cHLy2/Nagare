apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml   # drop this if ingress is handled elsewhere

# set the real image without touching deployment.yaml:
#   kustomize edit set image nagare=registry.example.com/nagare:1.2.3
images:
  - name: nagare
    newName: nagare
    newTag: latest
