apiVersion: apps/v1
kind: Deployment
metadata:
  name: nagare
  labels:
    app.kubernetes.io/name: nagare
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nagare
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nagare
    spec:
      containers:
        - name: nagare
          # push this repo's image to your registry and set it here
          image: nagare:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
