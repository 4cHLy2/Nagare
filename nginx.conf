server {
    listen      80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/javascript application/json
                      image/svg+xml application/wasm font/woff2;

    # for the healthcheck / k8s probes
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # hashed assets never change, cache them
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # don't cache the shell or new deploys won't show up
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
