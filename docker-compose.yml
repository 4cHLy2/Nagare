# plain http on :80. put whatever proxy/TLS you want in front — securing it is on you.
services:
  nagare:
    build:
      context: .
      dockerfile: Dockerfile
    image: nagare:latest
    container_name: nagare
    restart: unless-stopped
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
